<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Stable Free AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 420px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .key-section {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }
        .key-input-group {
            display: flex;
            gap: 10px;
        }
        .key-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
        }
        .submit-btn {
            padding: 8px 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .submit-btn:hover {
            background: #218838;
        }
        .status-msg {
            font-size: 11px;
            font-weight: bold;
            margin-top: 2px;
        }
        .output-box {
            height: 180px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            background: #fdfdfd;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .disabled-chat {
            opacity: 0.4;
            pointer-events: none;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        .prompt-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .send-btn {
            padding: 10px 15px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .send-btn:hover {
            background: #1557b0;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h3>Gemini Stable Free AI</h3>
    
    <div class="key-section">
        <label for="apiKey">Enter your Gemini API Key:</label>
        <div class="key-input-group">
            <input type="password" id="apiKey" class="key-input" placeholder="Paste 'AQ' key here...">
            <button onclick="loadApiKey()" class="submit-btn">Submit Key</button>
        </div>
        <div id="keyStatus" class="status-msg" style="color: #dc3545;">Key Status: Not Loaded</div>
    </div>

    <div id="chatInterface" class="disabled-chat">
        <div id="output" class="output-box">AI responses will appear here...</div>
        <div class="input-group">
            <input type="text" id="userInput" class="prompt-input" placeholder="Ask Gemini something...">
            <button onclick="askGemini()" class="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    let activeApiKey = "";

    function loadApiKey() {
        const apiKeyField = document.getElementById("apiKey");
        const statusMsg = document.getElementById("keyStatus");
        const chatInterface = document.getElementById("chatInterface");
        const rawKey = apiKeyField.value.trim();

        if (!rawKey) {
            statusMsg.innerText = "Error: Key box is empty.";
            statusMsg.style.color = "#dc3545";
            chatInterface.classList.add("disabled-chat");
            activeApiKey = "";
            return;
        }

        if (!rawKey.startsWith("AQ")) {
            statusMsg.innerText = "Error: Key must start with 'AQ'.";
            statusMsg.style.color = "#dc3545";
            chatInterface.classList.add("disabled-chat");
            activeApiKey = "";
            return;
        }

        activeApiKey = rawKey;
        statusMsg.innerText = "Key Status: Loaded & Active ✔";
        statusMsg.style.color = "#28a745";
        chatInterface.classList.remove("disabled-chat");
    }

    const sleep = (ms) => new Promise(res => setTimeout(res, ms));

    async function askGemini(retryCount = 0) {
        const inputField = document.getElementById("userInput");
        const outputDiv = document.getElementById("output");
        
        let prompt = inputField.value.trim();
        if (!prompt && retryCount > 0) {
            prompt = outputDiv.dataset.currentPrompt;
        }

        if (!activeApiKey) {
            outputDiv.innerText = "Please submit an active 'AQ' API key above first.";
            return;
        }

        if (!prompt) return;

        outputDiv.dataset.currentPrompt = prompt;

        if (retryCount === 0) {
            outputDiv.innerText = "Thinking...";
            inputField.value = "";
        } else {
            outputDiv.innerText = `Server busy. Retrying automatically... (Attempt ${retryCount}/3)`;
        }

        // FIXED: Using a public CORS proxy server to bypass browser block policies
        const targetUrl = "https://googleapis.com";
        const proxyUrl = "https://corsproxy.io?" + encodeURIComponent(targetUrl);

        try {
            const response = await fetch(proxyUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "x-goog-api-key": activeApiKey 
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                const isHighDemand = data.error.status === "UNAVAILABLE" || 
                                     data.error.code === 503 || 
                                     data.error.message.toLowerCase().includes("high demand");
                
                if (isHighDemand && retryCount < 3) {
                    await sleep(2000);
                    return askGemini(retryCount + 1);
                }

                outputDiv.innerText = "API Error: " + data.error.message;
                return;
            }

            if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                outputDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                outputDiv.innerText = "Error: Unexpected response layout.";
                console.log("Data structure:", data);
            }

        } catch (error) {
            console.error("Connection Error:", error);
            outputDiv.innerText = "Connection still failing. Please check if your 'AQ' key is fully active in Google AI Studio.";
        }
    }
</script>

</body>
</html>
