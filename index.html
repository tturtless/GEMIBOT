<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3.5 AI Chatbox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 400px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .output-box {
            height: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            background: #fafafa;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #1557b0;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h3>Gemini 3.5 AI</h3>
    <!-- Response Box -->
    <div id="output" class="output-box">AI responses will appear here...</div>
    
    <!-- Input Box and Button -->
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Ask Gemini something...">
        <button onclick="askGemini()">Send</button>
    </div>
</div>

<script>
    // Replace with your secret API key from Google AI Studio
    const API_KEY = "YOUR_GEMINI_API_KEY"; 

    async function askGemini() {
        const inputField = document.getElementById("userInput");
        const outputDiv = document.getElementById("output");
        const prompt = inputField.value;

        if (!prompt) return;

        outputDiv.innerText = "Thinking...";
        inputField.value = "";

        // API Endpoint for the Interactions API using gemini-3.5-flash
        const url = `https://googleapis.com{API_KEY}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "gemini-3.5-flash",
                    input: prompt
                })
            });

            const data = await response.json();
            
            // Extract the generated text from the new Interactions API response format
            if (data.output_text) {
                outputDiv.innerText = data.output_text;
            } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                // Fallback structure if using standard generateContent endpoint format
                outputDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                outputDiv.innerText = "Error: Could not parse response.";
            }

        } catch (error) {
            console.error("API Error:", error);
            outputDiv.innerText = "Failed to connect to Gemini API.";
        }
    }
</script>

</body>
</html>
