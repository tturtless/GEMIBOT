<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini API Code Key Refresh</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 420px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .key-section {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }
        .key-input-group {
            display: flex;
            gap: 10px;
        }
        .key-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
        }
        .refresh-btn {
            padding: 8px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .refresh-btn:hover {
            background: #bd2130;
        }
        .output-box {
            height: 180px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            overflow-y: auto;
            background: #fafafa;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        .prompt-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .send-btn {
            padding: 10px 15px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .send-btn:hover {
            background: #1557b0;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h3>Gemini 3.5 AI</h3>
    
    <!-- User API Key Input & Refresh Section -->
    <div class="key-section">
        <label for="apiKey">Enter your Gemini API Key:</label>
        <div class="key-input-group">
            <input type="password" id="apiKey" class="key-input" placeholder="Paste your API key here...">
            <button onclick="refreshApiKey()" class="refresh-btn">Refresh Key</button>
        </div>
    </div>

    <!-- Response Output Box -->
    <div id="output" class="output-box">AI responses will appear here...</div>
    
    <!-- Prompt Input Box and Button -->
    <div class="input-group">
        <input type="text" id="userInput" class="prompt-input" placeholder="Ask Gemini something...">
        <button onclick="askGemini()" class="send-btn">Send</button>
    </div>
</div>

<script>
    // Clears out the API key box and UI states completely
    function refreshApiKey() {
        document.getElementById("apiKey").value = "";
        document.getElementById("userInput").value = "";
        document.getElementById("output").innerText = "API Code cleared. Enter your new 'AQ' key above.";
        document.getElementById("apiKey").focus();
    }

    async function askGemini() {
        const apiKeyField = document.getElementById("apiKey");
        const inputField = document.getElementById("userInput");
        const outputDiv = document.getElementById("output");
        
        const apiKey = apiKeyField.value.trim();
        const prompt = inputField.value.trim();

        // 1. Validate that the API key box is not empty
        if (!apiKey) {
            outputDiv.innerText = "Error: Please enter your API key first.";
            return;
        }

        // 2. Prefix validation check (verifying if key starts with AQ)
        if (!apiKey.startsWith("AQ")) {
            outputDiv.innerText = "Error: Invalid key format. Your key must start with 'AQ'.";
            return;
        }

        if (!prompt) return;

        outputDiv.innerText = "Thinking...";
        inputField.value = "";

        // API Endpoint targeting gemini-3.5-flash
        const url = `https://googleapis.com{apiKey}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }]
                })
            });

            const data = await response.json();
            
            // Handle modern JSON response payload structures
            if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text) {
                outputDiv.innerText = data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                outputDiv.innerText = "API Error: " + data.error.message;
            } else {
                outputDiv.innerText = "Error: Could not parse response payload format.";
                console.log(data);
            }

        } catch (error) {
            console.error("Network Error:", error);
            outputDiv.innerText = "Failed to connect to the Gemini API.";
        }
    }
</script>

</body>
</html>
