<script>
    // Global variable to hold the successfully loaded key
    let activeApiKey = "";

    function loadApiKey() {
        const apiKeyField = document.getElementById("apiKey");
        const statusMsg = document.getElementById("keyStatus");
        const chatInterface = document.getElementById("chatInterface");
        const rawKey = apiKeyField.value.trim();

        if (!rawKey) {
            statusMsg.innerText = "Error: Key box is empty.";
            statusMsg.style.color = "#dc3545";
            chatInterface.classList.add("disabled-chat");
            activeApiKey = "";
            return;
        }

        if (!rawKey.startsWith("AQ")) {
            statusMsg.innerText = "Error: Key must start with 'AQ'.";
            statusMsg.style.color = "#dc3545";
            chatInterface.classList.add("disabled-chat");
            activeApiKey = "";
            return;
        }

        // Lock in the key and unlock the chat UI interface components
        activeApiKey = rawKey;
        statusMsg.innerText = "Key Status: Loaded & Active ✔";
        statusMsg.style.color = "#28a745";
        chatInterface.classList.remove("disabled-chat");
    }

    async function askGemini() {
        const inputField = document.getElementById("userInput");
        const outputDiv = document.getElementById("output");
        const prompt = inputField.value.trim();

        if (!activeApiKey) {
            outputDiv.innerText = "Please submit an active 'AQ' API key above first.";
            return;
        }

        if (!prompt) return;

        outputDiv.innerText = "Thinking...";
        inputField.value = "";

        // FIXED: Using the stable v1 endpoint format for browser-side fetch
        const url = `https://googleapis.com{activeApiKey}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }]
                })
            });

            // Read raw text to catch structural errors cleanly
            const textData = await response.text();
            let data;
            try {
                data = JSON.parse(textData);
            } catch(e) {
                outputDiv.innerText = "Failed to parse API response. Check console log.";
                console.error("Raw response:", textData);
                return;
            }
            
            // Extract the generated text from Google's standard payload format
            if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                outputDiv.innerText = data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                outputDiv.innerText = `API Error (${data.error.code}): ${data.error.message}`;
            } else {
                outputDiv.innerText = "Error: Key was loaded, but the API returned an unexpected empty layout.";
                console.log("Unexpected payload struct:", data);
            }

        } catch (error) {
            console.error("Network Error:", error);
            outputDiv.innerText = "Network Error: Browser blocked connection. Open developer console (F12) to read the exact error details.";
        }
    }
</script>
